services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporalone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporalone"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: temporal
      DB_PASSWORD: temporal
      DB_NAME: temporalone
      JWT_SECRET: dev-secret-change-in-prod
      SERVER_PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
